{% extends 'base/base.html' %}

{% block title %}{{ title }} - TSURI{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="page-header">
        <div class="row">
            <div class="col-md-8">
                <h1><i class="bi bi-book"></i> {{ title }}</h1>
            </div>
        </div>
    </div>
    
    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="id_name" class="form-label">Subject Name *</label>
                                {{ form.name }}
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="id_code" class="form-label">Subject Code *</label>
                                {{ form.code }}
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="id_description" class="form-label">Description</label>
                            {{ form.description }}
                        </div>
                        
                        {% if form.non_field_errors %}
                        <div class="alert alert-danger" role="alert">
                            {{ form.non_field_errors }}
                        </div>
                        {% endif %}
                        
                        <div class="d-grid gap-2 d-sm-flex justify-content-center mt-4">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Save Subject
                            </button>
                            <a href="{% url 'academics:subject_list' %}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const inputs = document.querySelectorAll('input, select, textarea');
    inputs.forEach(input => {
        if (!input.classList.contains('form-control') && !input.classList.contains('form-select')) {
            input.classList.add('form-control');
        }
    });
});
</script>
{% endblock %}
