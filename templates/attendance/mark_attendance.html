{% extends 'base/base.html' %}

{% block title %}Mark Attendance - TSURI{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="page-header">
        <div class="row">
            <div class="col-md-8">
                <h1><i class="bi bi-calendar-check"></i> Mark Attendance</h1>
            </div>
        </div>
    </div>
    
    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="id_student" class="form-label">Student *</label>
                            {{ form.student }}
                        </div>
                        
                        <div class="mb-3">
                            <label for="id_class_obj" class="form-label">Class *</label>
                            {{ form.class_obj }}
                        </div>
                        
                        <div class="mb-3">
                            <label for="id_subject" class="form-label">Subject</label>
                            {{ form.subject }}
                        </div>
                        
                        <div class="mb-3">
                            <label for="id_date" class="form-label">Date *</label>
                            {{ form.date }}
                        </div>
                        
                        <div class="mb-3">
                            <label for="id_status" class="form-label">Status *</label>
                            {{ form.status }}
                        </div>
                        
                        <div class="mb-3">
                            <label for="id_remarks" class="form-label">Remarks</label>
                            {{ form.remarks }}
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Mark Attendance
                            </button>
                            <a href="{% url 'attendance:attendance_list' %}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> Back
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const inputs = document.querySelectorAll('input, select, textarea');
    inputs.forEach(input => {
        if (!input.classList.contains('form-control') && !input.classList.contains('form-select')) {
            input.classList.add('form-control');
        }
    });
});
</script>
{% endblock %}
